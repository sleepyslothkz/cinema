<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>My Private Cinema</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        video { width: 90%; max-width: 800px; border: 2px solid #333; border-radius: 8px; }
        h1 { font-size: 1.2rem; margin-bottom: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h1>Личный плеер</h1>
    <video id="player" controls autoplay>
        <source src="" type="video/mp4">
    </video>

    <script>
        // Магия: берем ссылку из адреса сайта (?v=ссылка)
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('v');
        if (videoUrl) {
            document.querySelector('source').src = videoUrl;
            document.getElementById('player').load();
        } else {
            alert("Добавьте ссылку в URL через ?v=");
        }
    </script>
</body>
</html>
