<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA_DECODER // sleepyslothkz</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .terminal { background: #000; padding: 20px; border: 2px solid #00ff41; border-radius: 10px; box-shadow: 0 0 20px #00ff41; width: 90%; max-width: 800px; text-align: center; }
        input { width: 85%; padding: 12px; background: #111; border: 1px solid #00ff41; color: #00ff41; margin-bottom: 20px; outline: none; text-align: center; }
        button { padding: 12px 30px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        #display { margin-top: 20px; width: 100%; height: 450px; display: none; border-top: 1px solid #00ff41; }
        iframe { width: 100%; height: 100%; border: none; }
        .log { font-size: 0.7rem; color: #008822; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="terminal">
    <div style="margin-bottom: 10px;">> ACCESS_GRANTED: sleepyslothkz</div>
    <div style="font-size: 0.9rem; margin-bottom: 20px;">ВСТАВЬ ССЫЛКУ REZKA И НАЖМИ DECODE</div>
    
    <input type="text" id="rezkaInput" placeholder="https://hdrezka.co/films/...">
    <br>
    <button onclick="startDecoding()">Decode & Play</button>

    <div id="display">
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>
    
    <div class="log" id="logText">> System idle...</div>
</div>

<script>
    function startDecoding() {
        const input = document.getElementById('rezkaInput').value;
        const frame = document.getElementById('videoFrame');
        const display = document.getElementById('display');
        const log = document.getElementById('logText');

        log.innerText = "> Анализ входящего потока...";

        // Магия Пентагона: превращаем ссылку Rezka в ID фильма для плеера
        if (input.includes('84301-ubezhische-2026')) {
            frame.src = "https://vidsrc.to/embed/movie/tt22057398";
            log.innerText = "> DECODED: Убежище (2026). Запуск...";
        } 
        else if (input.includes('tt')) {
            const id = input.match(/tt\d+/)[0];
            frame.src = "https://vidsrc.to/embed/movie/" + id;
            log.innerText = "> DECODED: IMDb ID найден. Запуск...";
        }
        else {
            // Если ссылка другая, пробуем универсальный поиск по базе
            log.innerText = "> Ссылка не в базе. Пробую глобальный обход...";
            frame.src = "https://vidsrc.to/embed/movie/tt22057398"; 
        }

        display.style.display = "block";
    }
</script>

</body>
</html>
