<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта Bauyrzhan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; margin-top: 20px; }
        #map-container { width: 90%; max-width: 1000px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 10px; margin-top: 10px; }
        svg { width: 100%; height: auto; }
        path { fill: #dee2e6; stroke: #fff; stroke-width: 0.5; transition: fill 0.2s; cursor: pointer; }
        path:hover { fill: #3498db; }
        .active { fill: #27ae60 !important; }
        #info-panel { width: 90%; max-width: 1000px; padding: 20px; margin-top: 15px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 120px; text-align: center; }
        .flag-img { width: 120px; border: 1px solid #eee; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Карта мира: кликните на страну</h1>

    <div id="map-container">
        <svg viewBox="0 0 1000 500" id="world-map">
            <path id="KZ" title="Kazakhstan" d="M600,150 L650,150 L660,180 L610,190 Z" /> <path id="RU" title="Russia" d="M500,100 L800,100 L850,150 L550,140 Z" /> <path id="US" title="USA" d="M100,150 L250,150 L240,220 L110,210 Z" /> </svg>
    </div>

    <div id="info-panel">
        <div id="content">Нажмите на страну для получения данных...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/simplemaps-worldmap@1.1.1/mapdata.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simplemaps-worldmap@1.1.1/worldmap.js"></script>

    <script>
        // Настройка события после загрузки карты simplemaps
        simplemaps_worldmap.hooks.click_state = function(id) {
            fetchCountryInfo(id);
        };

        async function fetchCountryInfo(code) {
            const content = document.getElementById('content');
            content.innerHTML = "Загрузка данных...";
            
            try {
                const response = await fetch(`https://restcountries.com/v3.1/alpha/${code}`);
                const data = await response.json();
                const country = data[0];

                content.innerHTML = `
                    <h2 style="margin:0">${country.translations.rus.common}</h2>
                    <p><strong>Столица:</strong> ${country.capital ? country.capital[0] : '—'}</p>
                    <p><strong>Население:</strong> ${country.population.toLocaleString()} чел.</p>
                    <img class="flag-img" src="${country.flags.svg}" alt="Flag">
                `;
            } catch (e) {
                content.innerHTML = "Ошибка загрузки или данные не найдены.";
            }
        }
    </script>
</body>
</html>
