<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Hub</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111;
padding:20px;
text-align:center;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px 20px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:8px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
}

.card h3{
font-size:14px;
padding:10px;
}

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

iframe{
width:80%;
height:70%;
}

</style>

</head>

<body>

<header>

<h1>🎬 Movie Hub</h1>

<input id="search" placeholder="Поиск фильма">
<button onclick="searchMovie()">Найти</button>

</header>

<div id="movies" class="grid"></div>

<div id="player" class="player" onclick="closePlayer()">
<iframe id="trailer" frameborder="0" allowfullscreen></iframe>
</div>

<script>

const API_KEY="PASTE_YOUR_TMDB_KEY"

async function searchMovie(){

const q=document.getElementById("search").value

const res=await fetch(
`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`
)

const data=await res.json()

renderMovies(data.results)

}

function renderMovies(list){

const container=document.getElementById("movies")

container.innerHTML=""

list.forEach(movie=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
<h3>${movie.title}</h3>
`

card.onclick=()=>openTrailer(movie.id)

container.appendChild(card)

})

}

async function openTrailer(id){

const res=await fetch(
`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`
)

const data=await res.json()

const trailer=data.results.find(v=>v.type==="Trailer")

if(trailer){

document.getElementById("player").style.display="flex"

document.getElementById("trailer").src=
`https://www.youtube.com/embed/${trailer.key}`

}

}

function closePlayer(){

document.getElementById("player").style.display="none"

document.getElementById("trailer").src=""

}

</script>

</body>
</html>
